<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3f6fa">
  <title>SCS OS Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite"></div>

  <template id="login-template">
    <main class="login-screen">
      <section class="login-panel">
        <div class="brand-block">
          <img class="brand-logo-small" src="assets/img/scs-logo.png" alt="SCS OS Control">
          <div>
            <h1>SCS OS Control</h1>
            <p>CMMS industrial mobile-first</p>
          </div>
        </div>

        <form id="login-form" class="form-grid" autocomplete="on">
          <label>
            Email
            <input id="login-email" name="email" type="email" autocomplete="username" required>
          </label>
          <label>
            Senha
            <input id="login-password" name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary-action" type="submit">Entrar</button>
        </form>

        <div class="demo-access" aria-label="Acessos de teste local">
          <button type="button" data-demo-login="operador@scs.local">Operador</button>
          <button type="button" data-demo-login="gestor@scs.local">Gestor</button>
          <button type="button" data-demo-login="admin@scs.local">Admin</button>
        </div>

        <p class="small-note">Senha de teste local: 123456</p>
      </section>
    </main>
  </template>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/mock-api.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
